name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release version
        id: package
        shell: bash
        run: |
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)

          npm view "$name@$version" version > /tmp/npm-view.out 2>/dev/null &
          view_pid=$!

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$version" ]; then
              echo "::error::Git tag $GITHUB_REF_NAME does not match package.json version $version."
              kill "$view_pid" 2>/dev/null || true
              exit 1
            fi
          fi

          wait "$view_pid" && view_status=0 || view_status=$?
          if [ "$view_status" -eq 0 ] && [ -s /tmp/npm-view.out ]; then
            echo "::error::$name@$version is already published. Bump package.json before releasing."
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing $name@$version"

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Published $PACKAGE_NAME@$PACKAGE_VERSION to npm."
