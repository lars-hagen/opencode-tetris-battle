name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify release version
        id: package
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$version" ]; then
              echo "::error::Git tag $GITHUB_REF_NAME does not match package.json version $version."
              exit 1
            fi
          fi
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::error::$name@$version is already published. Bump package.json before releasing."
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing $name@$version"

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Published $PACKAGE_NAME@$PACKAGE_VERSION to npm."
